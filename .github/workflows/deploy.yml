name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ১. গিটহাব থেকে কোড চেকআউট করা
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.TOKEN || secrets.GITHUB_TOKEN }}

      # ২. নোড জেএস সেটআপ করা
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # ৩. ডিপেন্ডেন্সি ইনস্টল করা
      - name: Install dependencies
        run: npm ci || npm install

      # ৪. প্রোজেক্ট বিল্ড করা
      - name: Build project
        run: npm run build

      # ৫. ফায়ারবেস টুলস ইনস্টল ও নির্দিষ্ট সাইট ডেপ্লয় করা
      - name: Deploy to Firebase Hosting
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN || secrets.FIREBASE_SERVICE_ACCOUNT || secrets.TOKEN }}
        run: |
          npm install -g firebase-tools
          firebase deploy --only hosting:myincome --project income-details-7831b --token "$FIREBASE_TOKEN"
